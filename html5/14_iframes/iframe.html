<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />

    <title>Estudos de iframe</title>
    <style>
      iframe {
        width: 400px;
        height: 500px;
        border: 1px dashed black;
      }
    </style>
  </head>
  <body>
    <h1>Iframes</h1>
    <p>
      acessando o site do
      <iframe
        src="https://www.cursoemvideo.com"

        scolling="no"
      ></iframe>
      <a href="https://www.cursoemvideo.com" target="_blank">curso em video</a>
      para aprender iframe
    </p>
  </body>
