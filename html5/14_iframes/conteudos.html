<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>conteudos em iframe</title>
  </head>
  <body>
    <h1>conteudos em iframe</h1>
    <p>
      Lorem ipsum dolor sit amet, consectetur adipisicing elit. Fugiat
      reprehenderit alias quo eos nemo deleniti qui iure, fugit voluptatum unde
      qu od animi, quis sequi voluptate, sint consequuntur nihil harum rem.
    </p>
    <h2>videos</h2>
    <iframe
      width="560"
      height="315"
      src="https://www.youtube.com/embed/dzhJsc1YszU?si=9pVsToiJ4EOm1s9F"
      title="YouTube video player"
      frameborder="0"
      allow="
        accelerometer;
        autoplay;
        clipboard-write;
        encrypted-media;
        gyroscope;
        picture-in-picture;
        web-share;
      "
      referrerpolicy="strict-origin-when-cross-origin"
      allowfullscreen
    ></iframe>

    <h2>google maps</h2>
    <iframe
      src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3602.7705034065325!2d-49.28976817375739!3d-25.44593507755179!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x94dce3889c974203%3A0x8f102bbe58056d93!2zUHJhw6dhIGRvIEphcMOjbw!5e0!3m2!1spt-BR!2sbr!4v1773005644294!5m2!1spt-BR!2sbr"
      width="600"
      height="450"
      style="border: 0"
      allowfullscreen=""
      loading="lazy"
      referrerpolicy="no-referrer-when-downgrade"
    ></iframe>
  </body>
</html>
