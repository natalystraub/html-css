<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Teste de formulario</title>
  </head>
  <body>
    <h1>teste de formulario</h1>
    <form action="cadastro.php" method="post">
      <p>
        <label for="iname">Nome</label>
        <input
          type="text"
          name="name"
          id="iname"
          required
          maxlength="30"
          placeholder="Nome Completo"
        />
      </p>
      <p>
        <label for="imed">Média</label>
        <input type="number" name="med" id="imed" min="0" max="10" step="0.5" />
      </p>
      <p>
        <label for="iper">Periodo Letivo</label>
        <input type="month" name="per" id="iper" />
      </p>
      <p>
        <label for="idia">Dia</label>
        <input type="date" name="dia" id="idia" />
      </p>
      <p>
        <input type="submit" value="Enviar" />
        <input type="reset" value="Limpar" />
      </p>
    </form>
  </body>
</html>
