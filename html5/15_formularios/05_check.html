<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Check</title>
  </head>
  <body>
    <h1>Formulario</h1>
    <form action="cadastro.php" method="get">
      <fieldset>
        <legend>Sexo</legend>
        <input type="radio" name="sexo" id="sxfem" value="F" />
        <label for="sexfem">Feminino</label><br />
        <input type="radio" name="sexo" id="sxmasc" value="M" />
        <label for="sxmasc">Masculino</label>
      </fieldset>
      <fieldset>
        <legend>Esportes Favoritos</legend>
        <input type="checkbox" name="esbas" id="iesbas" />
        <label for="iesbas">Basquete</label><br />

        <input type="checkbox" name="esfut" id="iesfut" />
        <label for="iesfut">Futebol</label><br />

        <input type="checkbox" name="esvol" id="iesvol" />
        <label for="iesvol">Voleibol</label><br />
        <input type="checkbox" name="estenis" id="iestenis" />
        <label for="iestenis">Tenis</label><br />
      </fieldset>
      <input type="submit" value="Enviar" />
      <input type="reset" value="Limpar" />
    </form>
  </body>
</html>
