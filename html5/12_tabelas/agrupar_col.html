<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Personalizaçáo de tabela</title>
    <style>
      table {
        min-width: 36%;
        border-collapse: collapse;
      }
      caption,
      th,
      td {
        border: 1px solid black;
        padding: 2%;
      }
      col.cnome {
        background-color: rgba(157, 55, 252, 0.606);
      }
      col.cgrup {
        background-color: rgba(60, 17, 101, 0.414);
      }
    </style>
  </head>
  <body>
    <h1>Exercicio de tabela</h1>
    <table>
      <colgroup>
        <col class="cnome" />
        <col class="cgrup" span="2" />
      </colgroup>
      <caption>
        Cadastro
      </caption>
      <tr>
        <th scope="col">Nome</th>
        <th scope="col">Sexo</th>
        <th scope="col">Idade</th>
        <th scope="col">Profissão</th>
      </tr>
      <tr>
        <td>Ana Maria</td>
        <td>F</td>
        <td>25</td>
        <td>Jornalista</td>
      </tr>
      <tr>
        <td>Claudio</td>
        <td>M</td>
        <td>28</td>
        <td>Programador</td>
      </tr>

      <tr>
        <td>Gustavo</td>
        <td>M</td>
        <td>42</td>
        <td>Vendedor</td>
      </tr>

      <tr>
        <td>Maria</td>
        <td>F</td>
        <td>39</td>
        <td>Médica</td>
      </tr>
    </table>
  </body>
</html>
