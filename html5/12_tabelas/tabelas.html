<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tabelas em HTML</title>
    <style>
      table {
        border-collapse: collapse;
        width: 400px;
      }
      tr {
        background-color: lightgray;
      }
      td {
        border: 1px solid black;
        padding: 0.6em;
      }

      table.caixa {
        padding: 2m 1m;
        border: 1px solid orangered;
      }
    </style>
  </head>
  <body>
    <h1>Minha primeira tabela</h1>
    <!-- HIERARQUIA DE TABELA
    TABLE=TABELA
        TABLE ROW= linha de tabela
            TABLE HEADER= cabecalho de tabela
            TABLE DATA= dados de tabela  -->
    <table>
      <tr>
        <td>A1</td>
        <td>B1</td>
        <td>C1</td>
      </tr>
      <tr>
        <td>A2</td>
        <td>B2</td>
        <td>C2</td>
      </tr>
      <tr>
        <td>A3</td>
        <td>B3</td>
        <td>C3</td>
      </tr>
      <tr>
        <td>A4</td>
        <td>B4</td>
        <td>C4</td>
      </tr>
    </table>
  </body>
</html>
