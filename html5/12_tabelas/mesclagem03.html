<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mesclagem Tabela</title>
    <style>
      table {
        min-width: 28%;
      }
      .cabecalho {
        border-collapse: collapse;
        font-weight: bold;
        color: white;
        background-color: gray;
      }
      .cabecalho.-res {
        text-align: left;
      }
      th,
      td {
        border: 1px solid black;
        padding: 1.4%;
      }
      .table {
        border-collapse: collapse;
      }
    </style>
  </head>
  <body>
    <h1>Mesclagem Tabela</h1>
    <table class="table">
      <thead class="cabecalho">
        <tr>
          <th scope="col" rowspan="2">Área</th>
          <th scope="col" rowspan="2">Disciplinas</th>
          <th scope="col" colspan="2">Notas</th>
          <th scope="col" rowspan="2">Média</th>
        </tr>
        <tr>
          <th scope="col">Nota 1</th>
          <th scope="col">Nota 2</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td rowspan="4">Exatas</td>
          <td>Matemática</td>
          <td>0.0</td>
          <td>0.0</td>
          <td>0.0</td>
        </tr>
        <tr>
          <td>Física</td>
          <td>0.0</td>
          <td>0.0</td>
          <td>0.0</td>
        </tr>
        <tr>
          <td>Química</td>
          <td>0.0</td>
          <td>0.0</td>
          <td>0.0</td>
        </tr>
        <tr>
          <td>Biologia</td>
          <td>0.0</td>
          <td>0.0</td>
          <td>0.0</td>
        </tr>
        <tr>
          <th scope="row" class="cabecalho -res" colspan="4">
            Média de Exatas
          </th>
          <td style="background-color: grey; color: white">0.0</td>
        </tr>
        <tr>
          <td rowspan="2">Humanas</td>
          <td>História</td>
          <td>0.0</td>
          <td>0.0</td>
          <td>0.0</td>
        </tr>
        <tr>
          <td>Geografia</td>
          <td>0.0</td>
          <td>0.0</td>
          <td>0.0</td>
        </tr>
      </tbody>
      <tfoot>
        <tr>
          <th scope="row" class="cabecalho -res" colspan="4">
            Média de Humanas
          </th>
          <td style="background-color: grey; color: white">0.0</td>
        </tr>
      </tfoot>
    </table>
  </body>
</html>
